<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Noa Vellat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F5EFE0;
            --charcoal: #1A1814;
            --gold: #C4963A;
            --gold-light: #E2B96A;
            --warm-white: #FBF8F3;
            --section-alt: #F3EDE2;
            --text-muted: #6B6256;
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--warm-white);
            color: var(--charcoal);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        #hero-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(36px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position:  200% center; }
        }
        @keyframes floatY {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-16px); }
        }
        @keyframes lineDown {
            0%   { transform: scaleY(0); opacity: 0; }
            50%  { opacity: 1; }
            100% { transform: scaleY(1); opacity: 0.5; }
        }

        .fade-up   { animation: fadeUp .9s cubic-bezier(.16,1,.3,1) both; }
        .fade-up-2 { animation: fadeUp .9s .18s cubic-bezier(.16,1,.3,1) both; }
        .fade-up-3 { animation: fadeUp .9s .34s cubic-bezier(.16,1,.3,1) both; }
        .float     { animation: floatY 7s ease-in-out infinite; }

        .gold-text {
            background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 5s linear infinite;
        }

        .section-label {
            display: block;
            font-size: .7rem;
            letter-spacing: .35em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
            font-family: 'DM Sans', sans-serif;
        }
        .gold-bar {
            width: 48px; height: 1px;
            background: var(--gold);
            margin: 18px 0;
        }
        .gold-bar.center { margin: 18px auto; }

        .btn-dark {
            display: inline-block;
            padding: 13px 34px;
            background: var(--charcoal);
            color: var(--gold-light);
            border: 1px solid var(--gold);
            font-family: 'DM Sans', sans-serif;
            font-size: .78rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all .28s;
            cursor: pointer;
        }
        .btn-dark:hover { background: var(--gold); color: var(--charcoal); }

        .btn-ghost {
            display: inline-block;
            padding: 13px 34px;
            background: transparent;
            color: rgba(245,239,224,.75);
            border: 1px solid rgba(245,239,224,.35);
            font-family: 'DM Sans', sans-serif;
            font-size: .78rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all .28s;
        }
        .btn-ghost:hover { border-color: var(--gold-light); color: var(--gold-light); }

        nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            padding: 22px 56px;
            display: flex; justify-content: space-between; align-items: center;
            transition: background .4s, border .4s, padding .4s;
        }
        nav.scrolled {
            background: rgba(251,248,243,.93);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(196,150,58,.18);
            padding: 16px 56px;
        }
        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35rem;
            font-weight: 300;
            letter-spacing: .04em;
            text-decoration: none;
            transition: color .3s;
        }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a {
            font-family: 'DM Sans', sans-serif;
            font-size: .72rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            text-decoration: none;
            transition: color .2s, opacity .2s;
            opacity: .7;
        }
        .nav-links a:hover { opacity: 1; }

        #hero {
            position: relative;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background: linear-gradient(145deg, #1E1408 0%, #2E1C06 30%, #1A1004 60%, #0E0B04 100%);
        }

        .hero-vignette {
            position: absolute; inset: 0; z-index: 5;
            background: radial-gradient(ellipse 75% 75% at 50% 50%,
                transparent 15%, rgba(12,8,2,.6) 100%);
            pointer-events: none;
        }

        .hero-content {
            position: relative; z-index: 10;
            text-align: center; padding: 0 28px;
        }

        .hero-eyebrow {
            font-size: .68rem; letter-spacing: .45em;
            text-transform: uppercase; color: var(--gold);
            display: block; margin-bottom: 28px;
            font-family: 'DM Sans', sans-serif;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(4.5rem, 11vw, 10rem);
            font-weight: 300;
            line-height: .88;
            letter-spacing: -.02em;
            color: var(--cream);
        }

        .hero-amp {
            font-style: italic;
            color: var(--gold);
            display: block;
            font-size: clamp(3rem, 7vw, 7rem);
            line-height: 1.1;
        }

        .hero-sub {
            font-size: clamp(.85rem, 1.8vw, 1rem);
            letter-spacing: .25em;
            text-transform: uppercase;
            color: rgba(245,239,224,.4);
            margin: 32px 0 52px;
            font-family: 'DM Sans', sans-serif;
        }

        .hero-ctas { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

        .scroll-indicator {
            position: absolute; bottom: 44px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; text-decoration: none;
        }
        .scroll-indicator span {
            font-size: .6rem; letter-spacing: .3em;
            text-transform: uppercase; color: rgba(196,150,58,.5);
            font-family: 'DM Sans', sans-serif;
        }
        .scroll-indicator .s-line {
            width: 1px; height: 52px;
            background: linear-gradient(to bottom, rgba(196,150,58,.55), transparent);
            animation: lineDown 2.2s ease-in-out infinite;
            transform-origin: top;
        }

        #about {
            padding: 150px 56px;
            background: var(--warm-white);
        }
        .about-inner {
            max-width: 1060px; margin: 0 auto;
            display: grid; grid-template-columns: 360px 1fr; gap: 100px;
            align-items: center;
        }
        .about-img-wrap {
            position: relative; width: 360px; height: 440px;
        }
        .about-img {
            position: relative; z-index: 2;
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(15%);
        }
        .about-frame {
            position: absolute;
            top: 18px; right: -18px; bottom: -18px; left: 18px;
            border: 1px solid rgba(196,150,58,.32);
            z-index: 1;
        }
        .about-text p {
            font-size: 1.05rem; line-height: 1.9;
            color: var(--text-muted); margin-bottom: 20px;
        }
        .tag-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 36px; }
        .tag {
            padding: 7px 18px;
            border: 1px solid rgba(196,150,58,.32);
            font-size: .72rem; letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--gold);
            font-family: 'DM Sans', sans-serif;
        }

        #skills {
            padding: 130px 56px;
            background: var(--section-alt);
        }
        .skills-inner { max-width: 1060px; margin: 0 auto; }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            margin-top: 64px;
            border: 1px solid rgba(196,150,58,.15);
        }
        .skill-card {
            background: var(--warm-white);
            padding: 52px 42px;
            border-right: 1px solid rgba(196,150,58,.12);
            transition: background .3s;
        }
        .skill-card:last-child { border-right: none; }
        .skill-card:hover { background: #FDF9F4; }
        .skill-card-icon { font-size: 1.6rem; margin-bottom: 22px; display: block; }
        .skill-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.65rem; font-weight: 400;
            color: var(--charcoal); margin-bottom: 6px;
        }
        .skill-card .sub {
            font-size: .72rem; color: var(--text-muted);
            letter-spacing: .06em; margin-bottom: 30px;
            font-family: 'DM Sans', sans-serif;
        }
        .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .pill {
            padding: 5px 14px;
            font-size: .71rem; letter-spacing: .07em;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
            border: 1px solid;
        }

        #projects {
            padding: 150px 56px;
            background: var(--warm-white);
        }
        .projects-inner { max-width: 1200px; margin: 0 auto; }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 64px;
        }
        .proj-card {
            position: relative; overflow: hidden;
            height: 380px; display: block;
            text-decoration: none; background: #111;
        }
        .proj-card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform .6s cubic-bezier(.16,1,.3,1), opacity .4s;
            opacity: .82;
        }
        .proj-card:hover img { transform: scale(1.07); opacity: .6; }
        .proj-card::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(20,14,4,.94) 0%, rgba(20,14,4,.04) 55%);
        }
        .proj-info {
            position: absolute; bottom: 0; left: 0; right: 0;
            z-index: 2; padding: 32px 28px;
        }
        .proj-tag {
            font-family: 'DM Sans', sans-serif;
            font-size: .65rem; letter-spacing: .22em;
            text-transform: uppercase; color: var(--gold);
            display: block; margin-bottom: 8px;
        }
        .proj-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem; font-weight: 400;
            color: var(--cream); line-height: 1.1;
            display: block;
        }
        .proj-arrow {
            position: absolute; top: 28px; right: 28px; z-index: 2;
            color: var(--gold); font-size: .9rem;
            opacity: 0; transform: translateY(6px);
            transition: all .3s;
        }
        .proj-card:hover .proj-arrow { opacity: 1; transform: translateY(0); }
        .github-row { text-align: center; margin-top: 60px; }

        #contact {
            padding: 170px 56px;
            background: var(--charcoal);
            position: relative; overflow: hidden;
        }
        #contact::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 80%, rgba(196,150,58,.06), transparent),
                radial-gradient(ellipse 50% 60% at 80% 20%, rgba(196,150,58,.04), transparent);
        }
        .contact-inner {
            position: relative; z-index: 2;
            max-width: 640px; margin: 0 auto; text-align: center;
        }
        .contact-inner h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.4rem, 5vw, 4.2rem);
            font-weight: 300; color: var(--cream);
            line-height: 1.05; margin-bottom: 20px;
        }
        .contact-inner p {
            font-size: 1rem; line-height: 1.85;
            color: rgba(245,239,224,.42); margin: 28px 0 52px;
        }
        .social-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 44px; }
        .soc-btn {
            width: 50px; height: 50px;
            border: 1px solid rgba(196,150,58,.22);
            display: flex; align-items: center; justify-content: center;
            color: rgba(245,239,224,.48);
            font-size: 1.05rem; text-decoration: none;
            transition: all .3s;
        }
        .soc-btn:hover { border-color: var(--gold); color: var(--gold); }

        footer {
            background: #0C0A06; padding: 30px 56px;
            text-align: center; font-size: .72rem;
            letter-spacing: .1em; color: rgba(245,239,224,.18);
            font-family: 'DM Sans', sans-serif;
        }

        @media(max-width: 960px) {
            nav, nav.scrolled { padding: 18px 28px; }
            .nav-links { gap: 22px; }
            #about { padding: 100px 28px; }
            .about-inner { grid-template-columns: 1fr; gap: 52px; }
            .about-img-wrap { width: 100%; max-width: 320px; height: 380px; }
            #skills { padding: 100px 28px; }
            .skills-grid { grid-template-columns: 1fr; }
            .skill-card { border-right: none; border-bottom: 1px solid rgba(196,150,58,.12); }
            #projects { padding: 100px 28px; }
            .projects-grid { grid-template-columns: 1fr; }
            #contact { padding: 100px 28px; }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useEffect, useRef, useState } = React;

    function goTo(id) {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
    }

    /* ════════════════════════════════
       CANVAS 2D — KITCHEN EMOJI SCENE
       Emojis cuisine flottants avec parallax,
       halo doré, rotation lente & particules.
    ════════════════════════════════ */
    function KitchenScene({ canvasRef }) {
        useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            let W, H, raf;
            let mx = 0, my = 0;

            function resize() {
                W = canvas.width  = canvas.offsetWidth;
                H = canvas.height = canvas.offsetHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const onMove = e => {
                mx = (e.clientX / window.innerWidth  - .5);
                my = (e.clientY / window.innerHeight - .5);
            };
            window.addEventListener('mousemove', onMove);

            /* ══════ Emojis flottants ══════ */
            const EMOJIS = [
                { em:'🔪', x:.07,  y:.15, size:52, rot:-.6,  rotSpd:.0004, floatAmp:14, phase:0.0,  depth:1.0,  alpha:.82 },
                { em:'🍳', x:.88,  y:.12, size:58, rot:.3,   rotSpd:.0005, floatAmp:18, phase:1.4,  depth:0.9,  alpha:.78 },
                { em:'👨‍🍳', x:.78,  y:.70, size:54, rot:-.2,  rotSpd:.0003, floatAmp:12, phase:2.8,  depth:0.85, alpha:.72 },
                { em:'🥄', x:.14,  y:.74, size:48, rot:.8,   rotSpd:.0006, floatAmp:20, phase:0.7,  depth:1.1,  alpha:.76 },
                { em:'🫕', x:.70,  y:.42, size:56, rot:-.15, rotSpd:.0004, floatAmp:15, phase:3.2,  depth:0.8,  alpha:.70 },
                { em:'🧑‍🍳', x:.46,  y:.05, size:60, rot:.1,   rotSpd:.0003, floatAmp:10, phase:1.8,  depth:1.2,  alpha:.80 },
                { em:'🧂', x:.20,  y:.50, size:44, rot:.5,   rotSpd:.0007, floatAmp:22, phase:4.1,  depth:0.75, alpha:.68 },
                { em:'🍷', x:.90,  y:.80, size:46, rot:-.25, rotSpd:.0005, floatAmp:16, phase:2.3,  depth:0.7,  alpha:.65 },
                { em:'🥘', x:.60,  y:.20, size:54, rot:.4,   rotSpd:.0004, floatAmp:17, phase:5.0,  depth:0.95, alpha:.74 },
                { em:'🍴', x:.34,  y:.84, size:42, rot:-.7,  rotSpd:.0006, floatAmp:19, phase:3.7,  depth:0.88, alpha:.70 },
                { em:'🫙', x:.50,  y:.58, size:44, rot:.6,   rotSpd:.0005, floatAmp:13, phase:0.9,  depth:0.78, alpha:.65 },
                { em:'🥗', x:.95,  y:.33, size:50, rot:-.1,  rotSpd:.0004, floatAmp:21, phase:4.5,  depth:1.05, alpha:.72 },
                { em:'🍽️', x:.02,  y:.55, size:50, rot:.2,   rotSpd:.0003, floatAmp:16, phase:2.1,  depth:0.82, alpha:.68 },
                { em:'🥩', x:.28,  y:.28, size:46, rot:-.45, rotSpd:.0005, floatAmp:18, phase:5.8,  depth:0.92, alpha:.70 },
            ];
            EMOJIS.forEach(e => { e._rot = e.rot; });

            /* ══════ Particules dorées ══════ */
            const particles = Array.from({length: 80}, () => ({
                x: Math.random() * 1.4 - 0.2,
                y: Math.random() * 1.4 - 0.2,
                r: Math.random() * 1.6 + 0.5,
                speed: Math.random() * 0.00016 + 0.00005,
                phase: Math.random() * Math.PI * 2,
                alpha: Math.random() * 0.4 + 0.08,
                drift: (Math.random() - 0.5) * 0.00010,
            }));

            let lastT = 0;
            function loop(ts) {
                raf = requestAnimationFrame(loop);
                const dt = Math.min(ts - lastT, 40);
                lastT = ts;
                const t = ts * 0.001;

                ctx.clearRect(0, 0, W, H);

                /* — Lueur ambiante centrale — */
                const glow = ctx.createRadialGradient(W*.5, H*.5, 0, W*.5, H*.5, W*.6);
                glow.addColorStop(0, 'rgba(196,150,58,0.05)');
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glow;
                ctx.fillRect(0, 0, W, H);

                /* — Particules — */
                particles.forEach(p => {
                    p.y -= p.speed * dt;
                    p.x += p.drift * dt;
                    if (p.y < -0.05) { p.y = 1.08; p.x = Math.random() * 1.4 - 0.2; }
                    if (p.x < -0.08 || p.x > 1.08) p.drift *= -1;

                    const px = p.x * W + mx * 10;
                    const py = p.y * H + my * 7;
                    const flicker = Math.sin(t * 2.2 + p.phase) * 0.2 + 0.8;

                    if (p.r > 1.2) {
                        const halo = ctx.createRadialGradient(px, py, 0, px, py, p.r * 4);
                        halo.addColorStop(0, `rgba(226,185,106,${p.alpha * 0.4 * flicker})`);
                        halo.addColorStop(1, 'rgba(196,150,58,0)');
                        ctx.beginPath();
                        ctx.arc(px, py, p.r * 4, 0, Math.PI * 2);
                        ctx.fillStyle = halo;
                        ctx.fill();
                    }
                    ctx.beginPath();
                    ctx.arc(px, py, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(196,150,58,${p.alpha * flicker})`;
                    ctx.fill();
                });

                /* — Emojis — */
                EMOJIS.forEach(item => {
                    // Sway sinusoïdal → pas de jitter d'accumulation
                    const rot = item.rot + Math.sin(t * 0.4 * (item.rotSpd * 1800) + item.phase) * 0.10;
                    const floatY = Math.sin(t + item.phase) * item.floatAmp;
                    // Positions arrondies → pas de sub-pixel shaking
                    const px = Math.round(item.x * W + mx * 30 * item.depth);
                    const py = Math.round(item.y * H + my * 20 * item.depth + floatY);

                    ctx.save();
                    ctx.translate(px, py);
                    ctx.rotate(rot);
                    ctx.globalAlpha = item.alpha;

                    // halo doré derrière l'emoji
                    const haloR = item.size * 0.85;
                    const hg = ctx.createRadialGradient(0, 0, 0, 0, 0, haloR);
                    hg.addColorStop(0, `rgba(196,150,58,0.18)`);
                    hg.addColorStop(1, 'rgba(196,150,58,0)');
                    ctx.beginPath();
                    ctx.arc(0, 0, haloR, 0, Math.PI * 2);
                    ctx.fillStyle = hg;
                    ctx.fill();

                    // emoji
                    ctx.font = `${item.size}px serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(item.em, 0, 0);

                    ctx.restore();
                });
            }

            raf = requestAnimationFrame(loop);

            return () => {
                cancelAnimationFrame(raf);
                window.removeEventListener('resize', resize);
                window.removeEventListener('mousemove', onMove);
            };
        }, []);
        return null;
    }

    /* ════════ NAV ════════ */
    function Nav() {
        const [scrolled, setScrolled] = useState(false);
        useEffect(() => {
            const fn = () => setScrolled(window.scrollY > 60);
            window.addEventListener('scroll', fn);
            return () => window.removeEventListener('scroll', fn);
        }, []);
        const lc = scrolled ? 'rgba(26,24,20,.65)' : 'rgba(245,239,224,.55)';
        return (
            <nav className={scrolled ? 'scrolled' : ''}>
                <a href="#hero" onClick={e=>{e.preventDefault();goTo('hero')}} className="nav-logo"
                   style={{color: scrolled ? 'var(--charcoal)' : 'var(--cream)'}}>
                    Noa <strong style={{fontWeight:700}}>Vellat</strong>
                </a>
                <div className="nav-links">
                    {[['Accueil','hero'],['À propos','about'],['Projets','projects'],['Contact','contact']].map(([lbl,id])=>(
                        <a key={id} href={'#'+id} onClick={e=>{e.preventDefault();goTo(id)}} style={{color:lc}}>
                            {lbl}
                        </a>
                    ))}
                </div>
            </nav>
        );
    }

    /* ════════ HERO ════════ */
    function Hero() {
        const canvasRef = useRef(null);
        return (
            <section id="hero">
                <canvas ref={canvasRef} id="hero-canvas"/>
                <KitchenScene canvasRef={canvasRef}/>
                <div className="hero-vignette"/>
                <div className="hero-content">
                    <span className="hero-eyebrow fade-up">Portfolio — Développeur Web</span>
                    <h1 className="hero-title fade-up">
                        Créatif
                        <em className="hero-amp">&amp;</em>
                        Passionné
                    </h1>
                    <p className="hero-sub fade-up-2">De la gastronomie au code</p>
